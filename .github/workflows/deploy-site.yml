name: Deploy site

on:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - main
jobs:
  build:
    name: Build site
    runs-on: ubuntu-24.04

    steps:
      - name: Check-out (Production)
        uses: actions/checkout@v6
        if: github.event_name == 'push'

      - name: Check-out (Staging)
        uses: actions/checkout@v6
        if: github.event_name == 'pull_request_target'
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - uses: actions/upload-artifact@v6
        with:
          name: site-build
          path: dist
          if-no-files-found: error
          include-hidden-files: true

  deploy-production:
    name: Deploy to Production
    needs: [build]
    if: ${{ (github.ref == 'refs/heads/main') && (github.event_name == 'push') }}
    runs-on: ubuntu-24.04
    environment:
      name: production
      url: "https://jb3.dev/"

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: site-build
          path: dist

      - name: Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/production.key
          chmod 600 ~/.ssh/production.key
          cat >>~/.ssh/config <<END
          Host production
            HostName $SSH_HOST
            User ci
            IdentityFile ~/.ssh/production.key
            StrictHostKeyChecking no
          END
        env:
          SSH_KEY: ${{ secrets.DEPLOYMENT_SSH_KEY }}
          SSH_HOST: ${{ vars.DEPLOYMENT_HOST }}

      - name: Deploy to deployment host
        run: rsync -a --delete dist/ production:/usr/share/nginx/jb3.dev/

      - name: Logout from Tailscale & delete ephemeral node
        run: sudo tailscale logout

  approve-staging:
    name: Approve Staging Deployment
    needs: [build]
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request_target'

    steps:
      - name: Approve deployment to staging
        uses: actions/github-script@v8
        with:
          script: |
            const getGitHubDeploys = async () => {
              return await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                actor: 'renovate[bot]',
                branch: context.payload.pull_request.head.ref,
                status: 'waiting'
              }
            };

            let attempts = 0;

            while (true) {
              const deploys = await getGitHubDeploys();
              if (deploys.data.workflow_runs.length > 0) {
                // Get review history
                const approvalData = await github.rest.actions.getReviewsForRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: deploys.data.workflow_runs[0].id
                })
                await github.rest.actions.reviewPendingDeploymentsForRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: deploys.data.workflow_runs[0].id,
                  environment_ids: [approvalData.data[0].environments[0].id],
                  state: 'approved',
                  comment: 'Approved deployment to staging environment'
                })
                break;
              }
              console.log('No deployment review request found, waiting for 10 seconds before checking again');
              await new Promise(resolve => setTimeout(resolve, 10000));

              attempts++;
              if (attempts > 30) {
                throw new Error('No deployment review request found after 5 minutes, failing the job');
              }
            }

  deploy-staging:
    name: Deploy to Staging
    needs: [build]
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request_target'
    environment:
      name: staging
      url: "https://${{ github.event.number }}--${{ steps.slug.outputs.branch-name-slug }}.blog-staging.jb3.dev/"

    steps:
      - name: Generate slug for deployment name
        uses: gacts/github-slug@v1
        id: slug

      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: site-build
          path: dist

      - name: Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/production.key
          chmod 600 ~/.ssh/production.key
          cat >>~/.ssh/config <<END
          Host production
            HostName $SSH_HOST
            User ci
            IdentityFile ~/.ssh/production.key
            StrictHostKeyChecking no
          END
        env:
          SSH_KEY: ${{ secrets.DEPLOYMENT_SSH_KEY }}
          SSH_HOST: ${{ vars.DEPLOYMENT_HOST }}

      - name: Deploy to deployment host
        run: rsync -a --delete dist/ production:/usr/share/nginx/jb3.dev-staging/${{ github.event.number }}--${{ steps.slug.outputs.branch-name-slug }}

      - name: Logout from Tailscale & delete ephemeral node
        run: sudo tailscale logout
